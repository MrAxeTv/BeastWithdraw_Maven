##==============================================================##
## BeastWithdraw main configuration
##==============================================================##
## Start here when enabling or disabling whole withdraw systems.
## Item looks, command names, min/max amounts, tax, fees, and per-type
## messages are configured in Withdraws/<Type>/Withdraw.yml.
##
## Notes store their value in NBT. If another plugin stores, edits, stacks,
## or transports items, make sure it keeps custom NBT data intact.
##
## Most permissions are hardcoded and listed in plugin.yml and in the comments
## inside each related config section.
Settings:
  ## -------------------- Language --------------------
  ##Language selection for files stored in plugins/BeastWithdraw/Lang/.
  Language:
    Settings:
      ##Language file loaded from the Lang folder.
      File: "en-US.yml"
      ##Reserved for future per-player language support.
      ForceLanguage: false
  UpdateNotifications:
    AdminJoin:
      ##Show update notifications to admins when they join.
      Enabled: true
  ## -------------------- Withdraw Types --------------------
  ## Enable only the systems you use. Dependencies must be installed and enabled.
  Withdraws:
    ##No external dependency. Stores player experience in throwable XP bottles.
    XpBottle:
      Enabled: true
    ##Requires Vault plus an economy plugin such as EssentialsX.
    CashNote:
      Enabled: true
    ##Dependency: BeastTokens!
    ##When enabled, BeastWithdraw registers one note system for each enabled BeastTokens currency.
    ##Examples: Tokens -> /tokenswithdraw, Gems -> /gemswithdraw.
    ##Admin note type ids use currency ids without the command suffix: tokens, gems, shards.
    ##Each currency gets its own generated config folder in plugins/BeastWithdraw/Withdraws/<CurrencyId>/, for example Tokens/Withdraw.yml and Gems/Withdraw.yml.
    ##New generated currency files copy BeastTokens Settings.CurrencySymbol and Settings.Format into Settings.Messages.CurrencySymbol and Settings.Messages.Format.
    ##BeastTokens /<currency> withdraw is also delegated to the matching BeastWithdraw command while this hook is enabled for that currency.
    ##Native BeastTokens notes from drops/rewards and /BeastTokensAdmin givenote still redeem in BeastTokens.
    BeastTokens:
      Enabled: false
      Currencies:
        ##DefaultEnabled applies to every BeastTokens currency that is not listed under Overrides.
        ##true = create BeastWithdraw note commands for every writable BeastTokens currency by default.
        ##false = only currencies set to true under Overrides are hooked into BeastWithdraw.
        DefaultEnabled: true
        ##Use currency ids from plugins/BeastTokens/Currencies/<CurrencyId>.
        ##Set a currency to false to skip its /<currency>withdraw command.
        ##BeastTokens no longer has a native player withdraw fallback, so /<currency> withdraw will show an unavailable message for skipped currencies.
        ##Set DefaultEnabled to false and list only the currencies you want if you prefer an allow-list.
        Overrides:
          # Tokens: true
          # Gems: false
    ##Requires PlayerPoints.
    PlayerPointsNote:
      Enabled: false
    ##Requires BeastLifeSteal.
    BeastLifeSteal:
      Enabled: false
    ##Requires BeastMcMMORedeem.
    ##Allows players to withdraw and redeem BeastMcMMORedeem credits as BeastWithdraw notes.
    BeastMcMMORedeem:
      Enabled: false
  ## -------------------- Logging --------------------
  Logs:
    ##Main switch for withdraw and redeem transaction logging.
    ##When disabled, no transaction logs are written anywhere.
    Enabled: true
    Console:
      ##Show transaction logs in the normal server console/latest.log output.
      ##This can be temporarily overridden until restart with /BeastWithdraw debug.
      Enabled: true
    CombinedFile:
      ##Write all logged withdraw and redeem actions from every enabled type into one shared file.
      ##File path: plugins/BeastWithdraw/Logs/Combined/latest.log
      ##This only writes entries for types that still have Settings.Logs.Enabled: true in their own withdraw file.
      Enabled: true
    ##Per-type separate files are controlled inside each Withdraws/<type-folder>/<type>.yml file.
    ##Logging order is:
    ##1) Settings.Logs.Enabled in this file must be true.
    ##2) Settings.Logs.Enabled in the specific withdraw type file must be true.
    ##3) Console / CombinedFile / per-type SeparateFile then decide where that type is written.
  ## -------------------- Safety Rules --------------------
  ##Cancel villager trading with withdraw items.
  VillagerTrade:
    Allow: false
    ##Shopkeepers support. If enabled, remove signer-only lore from notes if you want identical notes to stack/trade cleanly.
    AllowShopKeeperPlugin: true
  ##Disable using withdraw items in crafting.
  CancelCrafting: true
  ##Drop withdraw item on floor if there is no space in player inventory
  WithdrawDropFloor: true
  ##Main /beastwithdraw command aliases.
  Aliases:
    - "bw"
    - "bwa"
##Config version (PLEASE DO NOT EDIT & DON'T COPY PAST OLD CONFIG OVER)
ConfigVersion: 3.9
