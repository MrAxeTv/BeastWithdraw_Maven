## Bukkit/Paper plugin descriptor.
## Server owners normally do not edit this file; use the files in plugins/BeastWithdraw/ instead.
name: BeastWithdraw
authors: [MrAxeTv]
main: me.mraxetv.beastwithdraw.BeastWithdrawPlugin
description: Simple handy withdraw plugin.
version: ${project.version}
softdepend: [Essentials, Vault, BeastTokens, BeastLifeSteal, BeastMcMMORedeem]
depend: [BeastLib]
api-version: 1.13
website: www.BeastUniverseStudio.com
permissions:
  BeastWithdraw.WithdrawGui.Use:
    description: Allows opening the main withdraw GUI menu.
    default: true
  BeastWithdraw.CashNote.WithdrawGui.Use:
    description: Allows opening the CashNote-specific withdraw GUI when enabled.
    default: false
  BeastWithdraw.XpBottle.WithdrawGui.Use:
    description: Allows opening the XpBottle-specific withdraw GUI when enabled.
    default: false
  BeastWithdraw.PlayerPointsNote.WithdrawGui.Use:
    description: Allows opening the PlayerPoints-specific withdraw GUI when enabled.
    default: false
  BeastWithdraw.heartwithdraw.WithdrawGui.Use:
    description: Allows opening the BeastLifeSteal heart-specific withdraw GUI when enabled.
    default: false
  BeastWithdraw.McMMORedeemCredits.WithdrawGui.Use:
    description: Allows opening the BeastMcMMORedeem credit-specific withdraw GUI when enabled.
    default: false
  BeastWithdraw.McMMORedeemCredits.Withdraw:
    description: Allows withdrawing BeastMcMMORedeem credit balance notes.
    default: true
  BeastWithdraw.McMMORedeemCredits.Withdraw.All:
    description: Allows withdrawing all BeastMcMMORedeem credits into notes.
    default: true
  BeastWithdraw.McMMORedeemCredits.Withdraw.Skill:
    description: Allows withdrawing existing mcMMO skill progress into BeastMcMMORedeem skill notes.
    default: op
  BeastWithdraw.McMMORedeemCredits.Redeem:
    description: Allows redeeming BeastMcMMORedeem credit and skill notes.
    default: true
  BeastWithdraw.McMMORedeemCredits.Redeem.Stacked:
    description: Allows sneak-redeeming stacked BeastMcMMORedeem notes.
    default: true
  BeastWithdraw.McMMORedeemCredits.ByPass.Fee:
    description: Allows bypassing BeastMcMMORedeem credit and skill-note withdraw fees.
    default: op
  BeastWithdraw.McMMORedeemCredits.ByPass.Tax:
    description: Allows bypassing BeastMcMMORedeem credit and skill-note redeem taxes.
    default: op
  BeastWithdraw.Depositor.Use:
    description: Allows opening the note depositor GUI.
    default: true
  BeastWithdraw.CashNote.Depositor.Use:
    description: Allows opening the CashNote-specific depositor GUI when enabled.
    default: false
  BeastWithdraw.XpBottle.Depositor.Use:
    description: Allows opening the XpBottle-specific depositor GUI when enabled.
    default: false
  BeastWithdraw.PlayerPointsNote.Depositor.Use:
    description: Allows opening the PlayerPoints-specific depositor GUI when enabled.
    default: false
  BeastWithdraw.heartwithdraw.Depositor.Use:
    description: Allows opening the BeastLifeSteal heart-specific depositor GUI when enabled.
    default: false
  BeastWithdraw.McMMORedeemCredits.Depositor.Use:
    description: Allows opening the BeastMcMMORedeem credit-specific depositor GUI when enabled.
    default: false
  BeastWithdraw.McMMORedeemCredits.Depositor.Skill.Use:
    description: Allows opening the BeastMcMMORedeem skill-note depositor GUI when enabled.
    default: false
  BeastWithdraw.admin.debug:
    description: Allows toggling withdraw transaction console debug output for the current session.
    default: op
  BeastWithdraw.admin.doctor:
    description: Allows running BeastWithdraw config diagnostics.
    default: op
