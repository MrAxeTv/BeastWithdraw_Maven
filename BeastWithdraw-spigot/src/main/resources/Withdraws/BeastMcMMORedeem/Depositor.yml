##==============================================================##
## BeastMcMMORedeem credit-note per-type depositor
##==============================================================##
## Set Enabled true to register the direct /mcmmocreditdeposit command.
## This GUI accepts only normal BeastMcMMORedeem credit notes.
## Skill-bound notes use Depositer-Skills.yml.
## The shared /depositnotes GUI is configured in deposit-settings.yml.
## Slot numbers are 1-based.
Enabled: false
##Direct depositor command: /mcmmocreditdeposit
##Hardcoded permission: BeastWithdraw.McMMORedeemCredits.Depositor.Use
Command:
  Name: "mcmmocreditdeposit"
  Aliases:
    - "mcmmocreditsdeposit"
    - "mcmmocreditdepositor"
    - "mcmmocreditdepositnotes"
GUI:
  Size: 54
  Title: "<gradient:#54f2d2:#9fb7ff>mcMMO Credit Depositor</gradient>"
  DepositSlots:
    - 11
    - 12
    - 13
    - 14
    - 15
    - 16
    - 17
    - 20
    - 21
    - 22
    - 23
    - 24
    - 25
    - 26
    - 29
    - 30
    - 31
    - 32
    - 33
    - 34
    - 35
  CloseAfterDeposit: true
  Items:
    DepositButton:
      Enabled: true
      Slot: 5
      Material: EMERALD
      DisplayName: "&a&lDeposit mcMMO Credit Notes"
      DisplayLore:
        - "&7Place mcMMO credit notes in the open slots."
        - "&eClick to deposit all accepted notes."
      Glow: true
    CloseButton:
      Enabled: true
      Slot: 50
      Material: BARRIER
      DisplayName: "&c&lBack"
      DisplayLore:
        - "&7Return all notes and close."
      Glow: false
  EmptySlot:
    Enabled: true
    Pattern:
      Type: ALL
    Items:
      Dummy_1:
        Material: CYAN_STAINED_GLASS_PANE
        DisplayName: "&7"
        DisplayLore: []
        Glow: false
      Dummy_2:
        Material: LIGHT_BLUE_STAINED_GLASS_PANE
        DisplayName: "&7"
        DisplayLore: []
        Glow: false
ConfigVersion: 1.4
