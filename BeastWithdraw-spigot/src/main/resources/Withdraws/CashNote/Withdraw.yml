##==============================================================##
## CashNote withdraw type
##==============================================================##
## Requires Vault and an economy plugin.
## Main command: /cashnote <amount|all> [stack]
## Aliases are configured near Settings.Aliases below.
##
## Quick edits:
## - Change the note item look under Settings.Item, Name, Lore, Player, and Server.
## - Change min/max/stack limits under Settings.Min, Max, and MaxStackSize.
## - Change redeem tax under Settings.Tax.Percentage.
## - Change withdraw fee under Settings.Charges.Fee.
## - Change chat messages under Settings.Messages.
##
## Notes store values in NBT. Do not use item-management plugins that strip NBT.
Settings:
  ##Set which item you want to use for Cash-Notes.
  ##Even if u changed to new item the old withdrawn items by player will be usable because of NBT  data storing.
  Item: "PAPER"
  # Used for version under 1.13!
  Data: 0
  ##Add enchant glow to item.
  Glow:
    Enabled: true
    Color: "GREEN"
  #Change Item to PLAYER_HEAD  uncomment SkullTexture and item will be replaced with specific textured head
  #https://minecraft-heads.com/custom-heads/head/120999-void-monster copy  "Value" section for skin of head and paste it in SkullTexture
  #You can use %player% or just type  name of player you want
  #SkullTexture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZmVhNTdlOWVkOWFmODZlZjc4NWVmZDUwZmY2ODQyMmNlYWZlOTlkZDIwM2Y1MTFjMGIxNTliNjE3ZTkyMTAxOSJ9fX0="
  # Custom model data is supported on 1.14+ versions.
  CustomModelData: 0
  ##Default item display used when Player or Server does not override it.
  Name: "<gradient:#6dff8a:#ffd76a>Bank Note</gradient> <gray>(Right-Click)</gray>"
  Lore:
    - "<dark_gray>[</dark_gray><gradient:#6dff8a:#ffd76a>Value</gradient><dark_gray>]</dark_gray> <white>%amount%</white>"
    - "%tax%"
    - "<gray>Right-click to redeem this note.</gray>"
  ##Set up your item display name & lores how do you like.
  ##If Player.Name or Player.Lore is missing it inherits Settings.Name or Settings.Lore.
  ##This is part of configuration for item which player will get when they withdraw there money /bWithdraw <money>.
  Player:
    Name: "<gradient:#6dff8a:#ffd76a>Bank Note</gradient> <gray>(Right-Click)</gray>"
    Lore:
      - "<dark_gray>[</dark_gray><gradient:#6dff8a:#ffd76a>Value</gradient><dark_gray>]</dark_gray> <white>%amount%</white>"
      - "<dark_gray>[</dark_gray><gradient:#6dff8a:#ffd76a>Signed By</gradient><dark_gray>]</dark_gray> <#6dff8a>%player%</#6dff8a>"
      - "%tax%"
      - "<gray>Right-click to redeem this note.</gray>"
  ##This is part of configuration for item withdraw by staff or console /bWithdraw <money> <player> <note-amount>.
  ##If Server.Name or Server.Lore is missing it inherits Settings.Name or Settings.Lore.
  Server:
    Name: "<gradient:#6dff8a:#ffd76a>Bank Note</gradient> <gray>(Right-Click)</gray>"
    Lore:
      - "<dark_gray>[</dark_gray><gradient:#6dff8a:#ffd76a>Value</gradient><dark_gray>]</dark_gray> <white>%amount%</white>"
      - "<dark_gray>[</dark_gray><gradient:#6dff8a:#ffd76a>Issued By</gradient><dark_gray>]</dark_gray> <#ffd76a>Beast Bank</#ffd76a>"
      - "%tax%"
      - "<gray>Right-click to redeem this note.</gray>"
  ##CustomName is the name shown above the dropped item. Set "" to disable it.
  CustomName: "<gradient:#6dff8a:#ffd76a>Bank Note</gradient> <gray>x%amount%</gray>"
  #Item Flags section you can find full list here https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/inventory/ItemFlag.html
  Flags:
    - "HIDE_ENCHANTS"
  ##Full note item overrides by amount.
  ##Missing values inherit from the main Settings section above.
  ##You can override Item, Data, CustomModelData, Glow, SkullTexture, CustomName, Flags, Enchants, Name, Lore, Player, Server, and Sounds.
  ##If a range sets Name or Lore, that value is used for both player-created and server/admin-created notes
  ##unless that same range also sets Player.Name, Server.Name, Player.Lore, or Server.Lore.
  ##To intentionally remove inherited values use explicit clear values:
  ##  CustomModelData: CLEAR
  ##  Data: CLEAR
  ##  SkullTexture: ""
  ##  CustomName: ""
  ##  Name: ""
  ##  Lore: []
  ##  Flags: []
  ##  Enchants: {}
  ##  Glow: false
  ##  Sounds:
  ##    Redeem:
  ##      Enabled: false
  AmountOverrides:
    Enabled: false
    ##Id is optional, but recommended for every range.
    ##Admins can force a named override regardless of amount with:
    ##/BeastWithdraw give <player> <id> <amount> [stack] [tax] [signer] -override <Id>
    ##/BeastWithdraw giveAll <id> <amount> [stack] [tax] [signer] -override <Id>
    ##Example: forcing Id: large applies this visual even to a 10.0 or 300.0 note.
    Ranges:
      - Id: large
        min: 1000.0
        max: 4999.99
        CustomModelData: 10
        Name: "<gradient:#6dff8a:#ffd76a>Large Bank Note</gradient> <gray>(Right-Click)</gray>"
        Lore:
          - "<dark_gray>[</dark_gray><gradient:#6dff8a:#ffd76a>Value</gradient><dark_gray>]</dark_gray> <white>%amount%</white>"
          - "<gray>Large tier note.</gray>"
        Player:
          Lore:
            - "<dark_gray>[</dark_gray><gradient:#6dff8a:#ffd76a>Value</gradient><dark_gray>]</dark_gray> <white>%amount%</white>"
            - "<dark_gray>[</dark_gray><gradient:#6dff8a:#ffd76a>Signed By</gradient><dark_gray>]</dark_gray> <#6dff8a>%player%</#6dff8a>"
            - "<gray>Large tier player note.</gray>"
        Server:
          Lore:
            - "<dark_gray>[</dark_gray><gradient:#6dff8a:#ffd76a>Value</gradient><dark_gray>]</dark_gray> <white>%amount%</white>"
            - "<dark_gray>[</dark_gray><gradient:#6dff8a:#ffd76a>Issued By</gradient><dark_gray>]</dark_gray> <#ffd76a>Beast Bank</#ffd76a>"
            - "<gray>Large tier server note.</gray>"
      - Id: premium
        min: 5000.0
        CustomModelData: 20
        CustomName: "<gradient:#6dff8a:#ffd76a>Premium Bank Note</gradient> <gray>x%amount%</gray>"
  ##Minimum amount which can be withdrawn to cash-note.
  Min: 25
  ##Maximum amount which can be withdrawn to cash-note.
  Max: 10000
  ##Maximum number of notes that can be created by one command or GUI confirm.
  MaxStackSize: 64
  ##Set amount format
  AmountFormat: "###,##0.00"
  ##Locale Region
  Locale: "en_US"
  DisableDecimals: false
  ##Tax will take specified percentage amount when player redeems CashNote (0.01% to 100% Possible values).
  ##Bypass Tax permission "BeastWithdraw.CashNote.ByPass.Tax"
  Tax:
    Lore:
      - ""
      - "&dTax: &c%tax%"
      - ""
    Percentage: 5

  ##Min and Max amount per permissions.
  ##Permission should be BeastWithdraw.CashNote.PermissionNotes.<name_of_perm>
  ##Here is one example: if player has "BeastWithdraw.CashNote.PermissionNotes.Small" permission they will be able to withdraw minimum 20 and maximum 50000
  ##You can rename this permissions settings and add new ones how you like.
  ##If PermissionNotes are enabled they will override default min and max setting if player has any of permissions for this groups.
  PermissionNotes:
    Enabled: false
    Small:
      Min: 20
      Max: 50000
      Tax:
        Percentage: 10
      MaxStackSize: 64
    Medium:
      Min: 10
      Max: 100000
      Tax:
        Percentage: 15
      MaxStackSize: 64
    High:
      Min: 10
      Max: 100000
      Tax:
        Percentage: 25
      MaxStackSize: 64

  Charges:
    ##Fee charged when a player creates cash notes.
    ##Bypass Fee permission "BeastWithdraw.CashNote.ByPass.Fee".
    Fee:
      Enabled: false
      Cost: 100

  ##Play sounds when a player withdraws or redeems CashNote.
  ##Sounds  for 1.9 and above: https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Sound.html
  ##Sounds for 1.7 and 1.8: https://www.spigotmc.org/wiki/cc-sounds-list/
  Sounds:
    Withdraw:
      Enabled: true
      Sound: "ENTITY_GENERIC_EXPLODE"
      Volume: 1.0
      Pitch: 1.0
    Redeem:
      Enabled: true
      Sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
      Volume: 1.0
      Pitch: 1.0
  Logs:
    ##Per-type transaction logging override.
    ##Default true means CashNote can be logged, but config.yml -> Settings.Logs.Enabled must also be true.
    ##Set this to false to stop CashNote from being written anywhere, including console, Combined, and CashNote separate file.
    Enabled: true
    SeparateFile:
      ##Also write CashNote into its own file: plugins/BeastWithdraw/Logs/CashNote/latest.log.
      ##This works together with the main config and does not replace the optional Combined log file.
      Enabled: false

  ##This is invisible lore name in which is stored amount of money change the name if you want disable old cashnotes.
  NBTKey: "bCashNote"
  ##Regular withdraw command: /cashnote <amount|all> [stack]
  ##Hardcoded permission: BeastWithdraw.CashNote.Withdraw
  ##Hardcoded all permission: BeastWithdraw.CashNote.Withdraw.All
  ##Aliases for /cashnote.
  Aliases: [ cashnote, withdraw, moneywithdraw, moneynote ]
  ##Optional item required before a player can create withdraw notes.
  ##This applies to the regular withdraw command and to the withdraw GUI input slots.
  RequiredItem:
    ##Set OverrideGlobal true to make this section override withdraw-settings.yml -> RequiredItem.
    OverrideGlobal: false
    Enabled: false
    Consume: true
    Amount: 1
    AmountPerNote: true
    Match:
      Material: PAPER
      # Data: 0
      DisplayName: ""
      RequireDisplayName: false
      Lore: []
      RequireLore: false
      CustomModelData: 0
      RequireCustomModelData: false
  Messages:
    ##Symbol and format used by formatted amount placeholders such as %amount%, %balance%, %fee%, and %stacked-amount%.
    ##Format placeholders: %symbol%, %amount%, and %amount_raw%.
    CurrencySymbol: "&a$"
    Format: "%symbol%%amount%"
    NotEnough: "%prefix% &cYou don't have %amount%! &e(Current: %balance%)"
    Help: "%prefix% &2You have %balance% &e(Use /withdraw <money>/<all> <note-amount>)"
    Withdraw: "%prefix% &eWithdrawn &b%stack%&7Cash Note&8: &a+%amount% &e(&7Total: &a%stacked-amount%&e) &8| &7Balance: &b%balance%"
    Redeem: "%prefix% &eRedeemed &b%stack%&7Cash Note&8: &a+%amount% &e(&7Total: &a%stacked-amount%&e) &8| &7Balance: &b%balance%"
    RedeemAndTax: "%prefix% &eRedeemed &b%stack%&7Cash Note&8: &a+%amount% &e(&7Total: &a%stacked-amount%&e) &cTax: &f-%tax% &e(&7Total: &c-%stacked-tax%&e) &8| &7Balance: &b%balance%"
    Min: "%prefix% &cYou must withdraw at least %min-amount%!."
    Max: "%prefix% &cYou can withdraw a maximum of %max-amount%!"
    RewardReceived: "%prefix% &bYou have received a cash note worth &2%stack%%amount%!"
    GiveAll: "%prefix% &bAll players have received a cash note!"
    TransactionFailed: "%prefix% &cTransaction failed, something went wrong please try some other amount!"
    ToBigNumber: "%prefix% &4%amount% is too large!"
    MaxStackSize: "%prefix% &cYou can't make stack bigger than %stack% items!"
    Fee:
      NotEnough: "%prefix% &cYou need %fee% to pay fee for this transaction!"
      TakenFee: "%prefix% &eYou paid %fee% fee for this transaction!"

##--------------------------------------------------------------------------------------------------------##
WithdrawGUI:
  ##Optional per-type direct GUI command and per-type GUI overrides.
  ##The main /withdrawmenu can still show this type even when this section is disabled.
  Enabled: false
  ##Direct GUI command: /cashnotewithdrawgui
  ##Hardcoded permission: BeastWithdraw.CashNote.WithdrawGui.Use
  Command:
    Enabled: false
    Name: "cashnotewithdrawgui"
    Aliases:
      - "cashgui"
      - "moneywithdrawgui"
  GUI:
    Title: "<gradient:#ffd86b:#71e7ff>Cash Note Withdraw</gradient>"
    ##Uncomment any GUI section here to override withdraw-settings.yml only for this type.
    # Size: 54
    # RequiredItemSlots: [29, 30, 31]
    # CloseAfterWithdraw: false
ConfigVersion: 2.4
