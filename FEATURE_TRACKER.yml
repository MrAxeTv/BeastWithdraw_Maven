meta:
  purpose: "Track user-facing BeastWithdraw changes for later wiki/documentation work."
  update_rule: "Whenever a new feature, permission, command, config option, or notable behavior change is added, update this file in the same task."
  format_notes:
    - "Keep entries focused on behavior visible to server owners, admins, or players."
    - "Prefer command names, permission nodes, config paths, and short behavior notes."
    - "Do not remove old entries unless the feature was removed from the plugin."

features:
  withdraw_gui_and_required_items:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Adds a configurable withdraw GUI system and optional required base items for creating withdraw notes."
    commands:
      main_gui:
        default: "/withdrawmenu"
        aliases:
          - "/withdrawgui"
          - "/notewithdraw"
          - "/withdrawnotes"
        config_paths:
          - "withdraw-settings.yml -> Command.Name"
          - "withdraw-settings.yml -> Command.Aliases"
      per_type_gui:
        config_paths:
          - "Withdraws/<type-folder>/Withdraw.yml -> WithdrawGUI.Command.Enabled"
          - "Withdraws/<type-folder>/Withdraw.yml -> WithdrawGUI.Command.Name"
          - "Withdraws/<type-folder>/Withdraw.yml -> WithdrawGUI.Command.Aliases"
        examples:
          - "/xpbottlewithdrawgui"
          - "/cashnotewithdrawgui"
          - "/<currency_id_lower>withdrawgui"
      doctor:
        command: "/beastwithdraw doctor"
        aliases:
          - "/beastwithdraw check"
    permissions:
      - "BeastWithdraw.WithdrawGui.Use"
      - "BeastWithdraw.CashNote.WithdrawGui.Use"
      - "BeastWithdraw.XpBottle.WithdrawGui.Use"
      - "BeastWithdraw.PlayerPointsNote.WithdrawGui.Use"
      - "BeastWithdraw.heartwithdraw.WithdrawGui.Use"
      - "BeastWithdraw.<beasttokens_currency_id>.WithdrawGui.Use"
      - "BeastWithdraw.admin.doctor"
    config_files:
      - "BeastWithdraw-spigot/src/main/resources/withdraw-settings.yml"
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/<type-folder>/Withdraw.yml"
      - "BeastWithdraw-spigot/src/main/resources/Lang/en-US.yml"
      - "BeastWithdraw-spigot/src/main/resources/plugin.yml"
    config_options:
      - "withdraw-settings.yml -> Enabled"
      - "withdraw-settings.yml -> Command.Name"
      - "withdraw-settings.yml -> Command.Aliases"
      - "withdraw-settings.yml -> AcceptedTypes.Mode"
      - "withdraw-settings.yml -> AcceptedTypes.Types"
      - "withdraw-settings.yml -> RequiredItem.*"
      - "withdraw-settings.yml -> Sounds.*"
      - "withdraw-settings.yml -> Animations.Open.*"
      - "withdraw-settings.yml -> Menu.*"
      - "withdraw-settings.yml -> Menu.CenterTypeRows"
      - "withdraw-settings.yml -> Menu.McMMORedeemSkillMenu.*"
      - "withdraw-settings.yml -> GUI.Size"
      - "withdraw-settings.yml -> GUI.Title"
      - "withdraw-settings.yml -> GUI.RequiredItemSlots"
      - "withdraw-settings.yml -> GUI.AmountEditor.StartingAmount"
      - "withdraw-settings.yml -> GUI.AmountEditor.StartingStack"
        - "withdraw-settings.yml -> GUI.AmountEditor.AdjustmentValues"
        - "withdraw-settings.yml -> GUI.AmountEditor.StackAdjustmentValues"
        - "withdraw-settings.yml -> GUI.Items.InfoItem"
        - "withdraw-settings.yml -> GUI.Items.AmountItem.Enabled"
        - "withdraw-settings.yml -> GUI.Items.AmountItem.Slot"
        - "withdraw-settings.yml -> GUI.Items.AddAmountButton"
        - "withdraw-settings.yml -> GUI.Items.RemoveAmountButton"
        - "withdraw-settings.yml -> GUI.Items.ResetButton"
      - "withdraw-settings.yml -> GUI.Items.MaxButton"
      - "withdraw-settings.yml -> GUI.Items.RemoveStackButton"
      - "withdraw-settings.yml -> GUI.Items.StackItem"
      - "withdraw-settings.yml -> GUI.Items.AddStackButton"
      - "withdraw-settings.yml -> GUI.Items.ConfirmButton"
      - "withdraw-settings.yml -> GUI.Items.BackButton"
      - "withdraw-settings.yml -> GUI.Items.CloseButton"
      - "withdraw-settings.yml -> GUI.EmptySlot.*"
      - "Withdraws/<type-folder>/Withdraw.yml -> Settings.RequiredItem.OverrideGlobal"
      - "Withdraws/<type-folder>/Withdraw.yml -> Settings.RequiredItem.*"
      - "Withdraws/<type-folder>/Withdraw.yml -> WithdrawGUI.Enabled"
      - "Withdraws/<type-folder>/Withdraw.yml -> WithdrawGUI.Command.Enabled"
      - "Withdraws/<type-folder>/Withdraw.yml -> WithdrawGUI.Command.Name"
      - "Withdraws/<type-folder>/Withdraw.yml -> WithdrawGUI.Command.Aliases"
      - "Withdraws/<type-folder>/Withdraw.yml -> WithdrawGUI.GUI.*"
    messages:
      - "Lang/<language>.yml -> Withdraws.RequiredItem.Missing"
      - "Lang/<language>.yml -> WithdrawGui.*"
    behavior:
      - "The main withdraw GUI opens a type selector for loaded withdraw handlers accepted by withdraw-settings.yml -> AcceptedTypes."
      - "Per-type direct withdraw GUI commands are disabled by default and can be enabled in that type's Withdraw.yml."
      - "Withdraw GUI command permissions are hardcoded: the main command uses BeastWithdraw.WithdrawGui.Use and per-type direct GUI commands use BeastWithdraw.<typeId>.WithdrawGui.Use."
      - "The withdraw amount GUI defaults to an editable transaction menu with add/remove amount controls, max, reset, stack controls, and a final confirm button."
      - "Withdraw GUI confirm clicks run the same withdraw validation path as normal commands, including min/max, balance, fee, tax, inventory, and required-item checks."
      - "Optional required base items can be matched by material, legacy data, display name, lore, and custom model data."
      - "Required base items apply to normal withdraw commands and GUI withdraw clicks; when Consume is true they are removed when the note is created."
      - "When a required item is enabled, the withdraw GUI exposes configured input slots and rejects unrelated items with a cooldown-protected message."
      - "Withdraw GUI input-slot contents are returned on close/back only when required-item mode is enabled, so filler GUI items are never returned as player items."
      - "Withdraw GUI action buttons can play configurable click sounds through withdraw-settings.yml -> Sounds.Click."
      - "Withdraw GUI main menu, BeastMcMMORedeem skill selector, and amount menu can play BeastMcMMORedeem-style staged open animations through withdraw-settings.yml -> Animations.Open.*."
      - "Open animations support SLIDE_LEFT_TO_RIGHT, SLIDE_RIGHT_TO_LEFT, SNAKE, DIAGONAL_WAVE, CENTER_OUT, SPIRAL, RANDOM_POP, and RAIN reveal orders, optional click locking, full-GUI placeholder staging, optional button-only animation, and per-step sounds."
      - "Empty slots in withdraw menu and withdraw amount GUIs support the same ALL, BORDER, TOP, BOTTOM, TOP_BOTTOM, LEFT, RIGHT, SIDES, RECTANGLE, and CHECKERBOARD filler patterns as deposit GUIs."
      - "Withdraw menu type buttons can be auto-grouped into centered rows with withdraw-settings.yml -> Menu.CenterTypeRows."
      - "When BeastMcMMORedeem skill notes are enabled and the player has skill-withdraw permission, clicking BeastMcMMORedeem in the main withdraw GUI opens a selector for normal credits or a specific mcMMO skill."
      - "The BeastMcMMORedeem selector supports configurable skill slots, per-skill icon materials, paged skill lists, and separate credit/skill buttons through withdraw-settings.yml -> Menu.McMMORedeemSkillMenu.*."
        - "The BeastMcMMORedeem selector default skill order, skill slots, skill icons, and bottom-row controls mirror BeastMcMMORedeem's own redeem menu layout."
        - "Selected mcMMO skill withdraw GUIs reuse the editable amount editor while showing the selected skill balance and returning Back to the BeastMcMMORedeem selector."
        - "Default withdraw amount GUI slots are centered and include dynamic InfoItem, AmountItem, StackItem, max/reset, and confirm controls that update after each amount or stack click."
        - "The withdraw amount editor AmountItem renders the actual selected note preview from Withdraws/<type-folder>/Withdraw.yml -> Settings.* and Settings.AmountOverrides.* instead of using separate GUI material/name/lore/model settings."
        - "Selected mcMMO skill AmountItem previews render through the skill-note item path, so %type%/%skill% and skill NBT match the selected skill before confirm."
        - "Withdraw amount GUI control clicks are guarded per action and raw slot for a short duplicate window so duplicate InventoryClickEvent dispatches cannot apply add/remove/stack/confirm/back actions twice."
        - "Withdraw amount GUI lore supports %selected_amount%, %selected_amount_raw%, %selected_stack%, %selected_total%, %selected_total_raw%, %max_amount%, %max_amount_raw%, %min_amount%, %max_limit%, %remaining_balance%, %total_amount%, %tax%, %tax_percent%, %tax_amount%, %stacked_tax_amount%, %fee%, and %fee_each% placeholders."
        - "Withdraw amount GUI lore lines containing %required_item% or %required_amount% are hidden automatically when required-item mode is disabled for the selected withdraw type."
        - "Configured withdraw GUI control items can still use GUI item AmountOverrides, but the AmountItem preview now uses the withdraw note AmountOverrides from the selected currency config."
        - "withdraw-settings.yml ConfigVersion 1.1 migrates the previous diagonal type button layout and off-center amount GUI slots only when the old defaults were still unchanged."
        - "withdraw-settings.yml ConfigVersion 1.2 enables the editable amount editor by default and moves the unchanged InfoItem slot away from the dynamic AmountItem slot."
      - "withdraw-settings.yml ConfigVersion 1.3 migrates unchanged add/remove amount and stack controls from stained-glass panes to colored terracotta blocks."
      - "withdraw-settings.yml ConfigVersion 1.4 adds the configurable BeastMcMMORedeem credit/skill selector menu defaults."
      - "withdraw-settings.yml ConfigVersion 1.5 migrates unchanged BeastMcMMORedeem selector defaults to the same skill order, icon materials, filler slots, and bottom-row control positions used by BeastMcMMORedeem."
      - "withdraw-settings.yml ConfigVersion 1.6 adds configurable withdraw GUI click/open sounds and BeastTokens-style open animation defaults."
      - "withdraw-settings.yml ConfigVersion 1.7 adds Animations.Open.PlaceholderItem.* and migrates unchanged open animation pacing/sounds to BeastMcMMORedeem-style staged CENTER_OUT defaults."
        - "withdraw-settings.yml ConfigVersion 1.8 changes the unchanged Animations.Open.AnimateEmptySlots default to true so the black placeholder covers the whole withdraw GUI before items reveal."
        - "withdraw-settings.yml ConfigVersion 1.9 removes obsolete Command.Permission config because withdraw GUI permissions are hardcoded."
        - "withdraw-settings.yml ConfigVersion 2.0 removes the legacy GUI.AmountButtons preset-button mode; the editable amount editor is now always used."
        - "withdraw-settings.yml ConfigVersion 2.1 removes GUI.Items.AmountItem material, name, lore, glow, CustomModelData, flags, and GUI AmountOverrides because the preview is sourced from the selected note config."
      - "/beastwithdraw doctor checks common GUI slot, multi-slot, material, min/max, required-item, and per-type command configuration issues."
      - "/beastwithdraw reload rebuilds withdraw GUI commands together with depositor and withdraw commands."
    verification:
      - "mvn package"

  xpbottle_integer_amounts:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Keeps XP bottle withdraw amounts as whole experience points for command and GUI withdraws."
    commands:
      - "/xpbottle <amount|all> [stack]"
      - "Withdraw GUI confirm for XpBottle"
    config_files:
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/XpBottle/Withdraw.yml"
    config_options:
      - "Withdraws/XpBottle/Withdraw.yml -> Settings.DisableDecimals"
    behavior:
      - "XP bottle configs default Settings.DisableDecimals to true because Minecraft experience points are integer-only."
      - "Existing XpBottle configs with the key missing or false are updated to Settings.DisableDecimals: true when the XpBottle handler loads."
      - "Withdraw GUI max-per-stack selection floors XP amounts, so a 5202 XP balance with stack 64 selects 81 XP per bottle instead of 81.28."

  yaml_default_documentation_cleanup:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Organizes bundled YAML defaults with clearer comments and fixes a misplaced CashNote fee path."
    config_files:
      - "config.yml"
      - "withdraw-settings.yml"
      - "deposit-settings.yml"
      - "Lang/en-US.yml"
      - "plugin.yml"
      - "Withdraws/<type-folder>/Withdraw.yml"
      - "Withdraws/<type-folder>/Depositor.yml"
      - "Withdraws/BeastMcMMORedeem/Withdraw-Skill.yml"
      - "Withdraws/BeastMcMMORedeem/Depositer-Skills.yml"
    config_options:
      - "Withdraws/CashNote/Withdraw.yml -> Settings.Charges.Fee"
    behavior:
      - "Bundled YAML defaults now include file-purpose headers, quick edit notes, dependency notes, command examples, permission notes, and slot-number guidance."
      - "Per-type WithdrawGUI comments explain that direct per-type GUI commands are optional and the main /withdrawmenu can still open the type."
      - "Per-type depositor comments explain that direct deposit commands are optional and the shared /depositnotes GUI is controlled by deposit-settings.yml."
      - "CashNote default fee settings moved from the old misplaced Settings.PermissionNotes.Fee path to Settings.Charges.Fee."
      - "Existing configs with Settings.PermissionNotes.Fee are migrated to Settings.Charges.Fee.Enabled and Settings.Charges.Fee.Cost when an asset handler loads."
      - "Withdraws/CashNote/Withdraw.yml ConfigVersion 2.4 documents the corrected fee section path."

  note_depositor_gui:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Adds a configurable GUI where players place BeastWithdraw notes and click a deposit button to redeem them into their balances."
    command:
      default: "/depositnotes"
      aliases:
        - "/depositor"
        - "/depositnote"
        - "/deposite"
      config_paths:
        - "deposit-settings.yml -> Command.Name"
        - "deposit-settings.yml -> Command.Aliases"
    permission:
      open_gui: "BeastWithdraw.Depositor.Use"
      per_type_open_gui:
        - "BeastWithdraw.CashNote.Depositor.Use"
        - "BeastWithdraw.XpBottle.Depositor.Use"
        - "BeastWithdraw.PlayerPointsNote.Depositor.Use"
        - "BeastWithdraw.heartwithdraw.Depositor.Use"
        - "BeastWithdraw.McMMORedeemCredits.Depositor.Use"
        - "BeastWithdraw.McMMORedeemCredits.Depositor.Skill.Use"
        - "BeastWithdraw.<beasttokens_currency_id>.Depositor.Use"
      note_redeem_permissions_still_required:
        - "BeastWithdraw.<type>.Redeem"
    config_files:
      - "BeastWithdraw-spigot/src/main/resources/deposit-settings.yml"
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/<type-folder>/Depositor.yml"
      - "BeastWithdraw-spigot/src/main/resources/Lang/en-US.yml"
      - "BeastWithdraw-spigot/src/main/resources/plugin.yml"
    config_options:
      - "deposit-settings.yml -> Enabled"
      - "deposit-settings.yml -> AcceptedTypes.Mode"
      - "deposit-settings.yml -> AcceptedTypes.Types"
      - "deposit-settings.yml -> Sounds.*"
      - "deposit-settings.yml -> Animations.Open.*"
      - "deposit-settings.yml -> GUI.Size"
      - "deposit-settings.yml -> GUI.Title"
      - "deposit-settings.yml -> GUI.DepositSlots"
      - "deposit-settings.yml -> GUI.CloseAfterDeposit"
      - "deposit-settings.yml -> GUI.Items.DepositButton"
      - "deposit-settings.yml -> GUI.Items.CloseButton"
      - "deposit-settings.yml -> GUI.EmptySlot.Enabled"
      - "deposit-settings.yml -> GUI.EmptySlot.Pattern.Type"
      - "deposit-settings.yml -> GUI.EmptySlot.Pattern.From"
      - "deposit-settings.yml -> GUI.EmptySlot.Pattern.To"
      - "deposit-settings.yml -> GUI.EmptySlot.Items"
      - "Withdraws/<type-folder>/Depositor.yml -> Enabled"
      - "Withdraws/<type-folder>/Depositor.yml -> Command.Name"
      - "Withdraws/<type-folder>/Depositor.yml -> Command.Aliases"
      - "Withdraws/<type-folder>/Depositor.yml -> GUI.*"
    messages:
      - "Lang/<language>.yml -> Depositor.*"
    behavior:
      - "Uses BeastLib's shaded Triumph StorageGui API so players can place notes into configured deposit slots."
      - "The main depositor settings live in plugins/BeastWithdraw/deposit-settings.yml instead of config.yml -> Settings.Depositor."
      - "The main depositor can accept all loaded withdraw types or only a configured allow-list with AcceptedTypes.Mode and AcceptedTypes.Types."
      - "Every loaded withdraw type has a sibling deposit override file in plugins/BeastWithdraw/Withdraws/<type-folder>/Depositor.yml."
      - "Per-type deposit override files are disabled by default; setting Enabled: true registers that type's configured deposit command."
      - "Per-type depositors always accept only their own withdraw type and can override GUI layout, buttons, fillers, and command aliases."
      - "Depositor command permissions are hardcoded: the main depositor uses BeastWithdraw.Depositor.Use, per-type depositors use BeastWithdraw.<typeId>.Depositor.Use, and the mcMMO skill depositor uses BeastWithdraw.McMMORedeemCredits.Depositor.Skill.Use."
      - "Depositor GUI action buttons can play configurable click sounds through deposit-settings.yml -> Sounds.Click."
      - "Depositor GUI opens can play BeastMcMMORedeem-style staged open animations through deposit-settings.yml -> Animations.Open.*."
      - "Depositor open animations support SLIDE_LEFT_TO_RIGHT, SLIDE_RIGHT_TO_LEFT, SNAKE, DIAGONAL_WAVE, CENTER_OUT, SPIRAL, RANDOM_POP, and RAIN reveal orders, optional click locking, full top-GUI placeholder staging, optional button-only animation, and per-step sounds."
      - "Empty slots can be filled with rotating configured items using ALL, BORDER, TOP, BOTTOM, TOP_BOTTOM, LEFT, RIGHT, SIDES, RECTANGLE, or CHECKERBOARD patterns."
      - "Deposit slots and action buttons override filler items."
      - "Temporary animation placeholders in deposit slots are ignored on GUI close so black glass staging items are never returned to player inventories."
      - "Only BeastWithdraw notes accepted by the open depositor profile can be placed into deposit slots."
      - "Depositing checks each note type's existing redeem permission before crediting that balance."
      - "Cash notes use the existing BigDecimal Vault transaction verification before the note is consumed."
      - "Heart notes keep BeastLifeSteal capacity and partial-redeem behavior; unredeemed notes are returned or left in the GUI."
      - "Items left in deposit slots are returned to the player's inventory on close, with overflow dropped naturally."
      - "Default layout puts the deposit button in top-middle slot 5, the back/close button in bottom-middle slot 50, and a centered 21-slot deposit field at slots 11-17, 20-26, and 29-35."
      - "Existing config.yml -> Settings.Depositor values are migrated into deposit-settings.yml the first time the new file is created."
      - "deposit-settings.yml ConfigVersion 1.1 migrates the previous default depositor button slots 50/49 to 5/50 only when those old defaults were still unchanged."
      - "deposit-settings.yml ConfigVersion 1.2 adds configurable depositor GUI click/open sounds and staged open animation defaults."
      - "deposit-settings.yml ConfigVersion 1.3 migrates the unchanged 18-slot depositor field to the centered 21-slot field by adding slots 17, 26, and 35."
      - "deposit-settings.yml ConfigVersion 1.4 removes obsolete Command.Permission config because depositor permissions are hardcoded."

  withdraw_type_folder_layout:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Stores each withdraw type in a per-type folder with Withdraw.yml plus matching depositor override files."
    config_files:
      - "plugins/BeastWithdraw/Withdraws/CashNote/Withdraw.yml"
      - "plugins/BeastWithdraw/Withdraws/CashNote/Depositor.yml"
      - "plugins/BeastWithdraw/Withdraws/XpBottle/Withdraw.yml"
      - "plugins/BeastWithdraw/Withdraws/XpBottle/Depositor.yml"
      - "plugins/BeastWithdraw/Withdraws/PlayerPointsNote/Withdraw.yml"
      - "plugins/BeastWithdraw/Withdraws/PlayerPointsNote/Depositor.yml"
      - "plugins/BeastWithdraw/Withdraws/BeastLifeSteal/Withdraw.yml"
      - "plugins/BeastWithdraw/Withdraws/BeastLifeSteal/Depositor.yml"
      - "plugins/BeastWithdraw/Withdraws/<CurrencyId>/Withdraw.yml"
      - "plugins/BeastWithdraw/Withdraws/<CurrencyId>/Depositor.yml"
    migration:
      - "Existing flat files such as plugins/BeastWithdraw/Withdraws/CashNote.yml are moved to their new nested path when the target file does not already exist."
      - "Existing nested type files such as plugins/BeastWithdraw/Withdraws/CashNote/CashNote.yml are moved to plugins/BeastWithdraw/Withdraws/CashNote/Withdraw.yml when the target file does not already exist."
      - "Existing flat BeastTokens currency files such as plugins/BeastWithdraw/Withdraws/BeastTokens-Tokens.yml are moved to plugins/BeastWithdraw/Withdraws/Tokens/Withdraw.yml."
      - "Existing nested BeastTokens currency files such as plugins/BeastWithdraw/Withdraws/Tokens/BeastTokens-Tokens.yml are moved to plugins/BeastWithdraw/Withdraws/Tokens/Withdraw.yml when the target file does not already exist."
      - "Legacy flat per-type deposit override files are also migrated when present."
    behavior:
      - "Bundled defaults are stored under BeastWithdraw-spigot/src/main/resources/Withdraws/<type-folder>/."
      - "BeastTokens uses Withdraws/BeastTokens/Withdraw.yml and Withdraws/BeastTokens/Depositor.yml as templates for each generated currency folder."
      - "The BeastLib compatibility fallback command loader checks both the new nested path and the old flat disk path for aliases."

  beasttokens_multi_currency_notes:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Registers BeastTokens note withdraw/redeem handlers per BeastTokens currency and lets BeastTokens currency commands delegate withdraws to BeastWithdraw."
    dependency:
      plugin: "BeastTokens"
      config_switch: "config.yml -> Settings.Withdraws.BeastTokens.Enabled"
    commands:
      generated_roots:
        - "/<currency_id>withdraw"
      examples:
        - "/tokenswithdraw <amount|all> [note-amount]"
        - "/gemswithdraw <amount|all> [note-amount]"
      admin_type_ids:
        - "tokens"
        - "gems"
        - "shards"
      beasttokens_delegated_subcommands:
        - "/<currency_id> withdraw <amount|all> [note-amount]"
        - "/<currency_id> note <amount|all> [note-amount]"
      currency_alias_templates:
        path: "Withdraws/BeastTokens/Withdraw.yml -> Settings.CurrencyAliases"
        defaults:
          - "/%currency_id_lower%note"
          - "/%currency_id_lower%notes"
    permissions:
      currency_specific:
        - "BeastWithdraw.<currency_id>.Withdraw"
        - "BeastWithdraw.<currency_id>.Withdraw.All"
        - "BeastWithdraw.<currency_id>.Redeem"
        - "BeastWithdraw.<currency_id>.Redeem.Stacked"
        - "BeastWithdraw.<currency_id>.ByPass.Fee"
        - "BeastWithdraw.<currency_id>.ByPass.Tax"
        - "BeastWithdraw.<currency_id>.PermissionNotes.<name>"
    config_files:
      - "BeastWithdraw-spigot/src/main/resources/config.yml"
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/BeastTokens/Withdraw.yml"
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/BeastTokens/Depositor.yml"
      - "Generated runtime files: plugins/BeastWithdraw/Withdraws/<CurrencyId>/Withdraw.yml"
      - "Generated runtime files: plugins/BeastWithdraw/Withdraws/<CurrencyId>/Depositor.yml"
    config_options:
      - "config.yml -> Settings.Withdraws.BeastTokens.Enabled"
      - "config.yml -> Settings.Withdraws.BeastTokens.Currencies.DefaultEnabled"
      - "config.yml -> Settings.Withdraws.BeastTokens.Currencies.Overrides.<CurrencyId>"
      - "Withdraws/<CurrencyId>/Withdraw.yml -> Settings.CurrencyAliases"
      - "Withdraws/<CurrencyId>/Withdraw.yml -> Settings.Messages.CurrencySymbol"
      - "Withdraws/<CurrencyId>/Withdraw.yml -> Settings.Messages.Format"
      - "Withdraws/<CurrencyId>/Withdraw.yml -> Settings.Messages.*"
      - "Withdraws/<CurrencyId>/Depositor.yml -> Enabled"
      - "Withdraws/<CurrencyId>/Depositor.yml -> Command.Name"
      - "Withdraws/<CurrencyId>/Depositor.yml -> Command.Aliases"
      - "Withdraws/<CurrencyId>/Depositor.yml -> GUI.*"
    placeholders:
      - "%currency_id%"
      - "%currency_id_lower%"
      - "%currency_name%"
      - "%currency_display_name%"
      - "%currency_symbol%"
      - "%symbol%"
      - "%currency_prefix%"
      - "%currency_withdraw_command%"
      - "%withdraw_command%"
    behavior:
      - "Each non-read-only BeastTokens currency receives its own AssetHandler and root withdraw command."
      - "BeastTokens currency AssetHandler ids are the plain currency ids, so /beastwithdraw give uses gems/tokens/shards instead of gemswithdraw/tokenswithdraw/shardswithdraw."
      - "The generated player command keeps the withdraw suffix, for example /gemswithdraw."
      - "Each BeastTokens currency receives its own generated folder under plugins/BeastWithdraw/Withdraws/<CurrencyId>/."
      - "Each BeastTokens currency receives its own generated BeastWithdraw config file copied from Withdraws/BeastTokens/Withdraw.yml."
      - "Each BeastTokens currency receives its own generated deposit override file copied from Withdraws/BeastTokens/Depositor.yml."
      - "BeastWithdraw exposes a refresh API so BeastTokens can rebuild per-currency note handlers and generate missing Withdraw.yml and Depositor.yml files after currencies are created, deleted, enabled, disabled, or reloaded."
      - "Admin give/giveall reward and confirmation messages resolve BeastTokens currency placeholders such as %currency_name%."
      - "New BeastTokens currency note configs copy BeastTokens Settings.CurrencySymbol into Settings.Messages.CurrencySymbol on first creation."
      - "New BeastTokens currency note configs copy BeastTokens Settings.Format into Settings.Messages.Format on first creation."
      - "Generated BeastTokens currency note configs normalize legacy amount-format aliases %currency%/%currency_raw% into %amount%/%amount_raw%."
      - "Currency registration can be disabled per BeastTokens currency with Settings.Withdraws.BeastTokens.Currencies.Overrides.<CurrencyId>."
      - "If a currency is disabled for BeastWithdraw, BeastTokens /<currency> withdraw reports that BeastWithdraw is required/configured for that currency; BeastTokens no longer has native player withdraw fallback logic."
      - "BeastWithdraw BeastTokens currency configs do not contain Settings.NBTKey; the amount NBT key is read from BeastTokens Currencies/<CurrencyId>/setting.yml -> NoteItem.NBTKey."
      - "BeastWithdraw notes store both the BeastTokens NoteItem.NBTKey amount and BeastTokensCurrency so redeem deposits into the correct BeastTokens currency."
      - "Currency placeholders are resolved before color/gradient formatting in note names and lore, so placeholders inside gradients render correctly."

  beastmcmmoredeem_credit_notes:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Adds BeastMcMMORedeem-backed mcMMO redeem credit notes that players can withdraw and redeem through BeastWithdraw."
    dependency:
      plugin: "BeastMcMMORedeem"
      config_switch: "config.yml -> Settings.Withdraws.BeastMcMMORedeem.Enabled"
      api: "me.mraxetv.beastmcmmoiredeem.api.BeastMcMMORedeemAPI"
    commands:
      primary: "/mcmmocreditwithdraw <amount|all> [stack]"
      skill_notes: "/mcmmocreditwithdraw <skill> <amount|all> [stack]"
      admin_skill_give: "/BeastWithdraw give <player> mcmmoredeemskillcredits <skill> <amount> [stack] [tax] [signer] [-override <id>] [-s]"
      admin_skill_giveall: "/BeastWithdraw giveAll mcmmoredeemskillcredits <skill> <amount> [stack] [tax] [signer] [-override <id>] [-s]"
      aliases:
        - "/mcmmoctwithdraw"
        - "/mcmmocreditswithdraw"
        - "/mcmmocreditsnote"
      admin_type_ids:
        - "McMMORedeemCredits"
        - "mcmmoredeemcredits"
        - "mcmmocredits"
        - "beastmcmmoredeem"
      optional_gui_commands:
        withdraw_gui: "/mcmmocreditwithdrawgui"
        depositor: "/mcmmocreditdeposit"
    permissions:
      - "BeastWithdraw.McMMORedeemCredits.Withdraw"
      - "BeastWithdraw.McMMORedeemCredits.Withdraw.All"
      - "BeastWithdraw.McMMORedeemCredits.Redeem"
      - "BeastWithdraw.McMMORedeemCredits.Redeem.Stacked"
      - "BeastWithdraw.McMMORedeemCredits.ByPass.Fee"
      - "BeastWithdraw.McMMORedeemCredits.ByPass.Tax"
      - "BeastWithdraw.McMMORedeemCredits.Withdraw.Skill"
      - "BeastWithdraw.McMMORedeemCredits.WithdrawGui.Use"
      - "BeastWithdraw.McMMORedeemCredits.Depositor.Use"
    config_files:
      - "BeastWithdraw-spigot/src/main/resources/config.yml"
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/BeastMcMMORedeem/Withdraw.yml"
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/BeastMcMMORedeem/Depositor.yml"
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/BeastMcMMORedeem/Withdraw-Skill.yml"
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/BeastMcMMORedeem/Depositer-Skills.yml"
    config_options:
      - "config.yml -> Settings.Withdraws.BeastMcMMORedeem.Enabled"
      - "Withdraws/BeastMcMMORedeem/Withdraw.yml -> Settings.CommandName"
      - "Withdraws/BeastMcMMORedeem/Withdraw.yml -> Settings.*"
      - "Withdraws/BeastMcMMORedeem/Depositor.yml -> Enabled"
      - "Withdraws/BeastMcMMORedeem/Depositor.yml -> Command.Name"
      - "Withdraws/BeastMcMMORedeem/Depositor.yml -> Command.Aliases"
      - "Withdraws/BeastMcMMORedeem/Depositor.yml -> GUI.*"
      - "Withdraws/BeastMcMMORedeem/Withdraw-Skill.yml -> Settings.Enabled"
      - "Withdraws/BeastMcMMORedeem/Withdraw-Skill.yml -> Settings.NBTKey"
      - "Withdraws/BeastMcMMORedeem/Withdraw-Skill.yml -> Settings.SkillNBTKey"
      - "Withdraws/BeastMcMMORedeem/Withdraw-Skill.yml -> Settings.Name"
      - "Withdraws/BeastMcMMORedeem/Withdraw-Skill.yml -> Settings.Lore"
      - "Withdraws/BeastMcMMORedeem/Withdraw-Skill.yml -> Settings.Player.*"
      - "Withdraws/BeastMcMMORedeem/Withdraw-Skill.yml -> Settings.Server.*"
      - "Withdraws/BeastMcMMORedeem/Withdraw-Skill.yml -> Settings.Messages.*"
      - "Withdraws/BeastMcMMORedeem/Depositer-Skills.yml -> Enabled"
      - "Withdraws/BeastMcMMORedeem/Depositer-Skills.yml -> Command.Name"
      - "Withdraws/BeastMcMMORedeem/Depositer-Skills.yml -> Command.Aliases"
      - "Withdraws/BeastMcMMORedeem/Depositer-Skills.yml -> GUI.*"
    messages:
      - "Lang/<language>.yml -> Withdraws.Admin.SkillGiveUsage"
      - "Lang/<language>.yml -> Withdraws.Admin.SkillGiveAllUsage"
    behavior:
      - "Registers a normal BeastWithdraw AssetHandler with type id McMMORedeemCredits when BeastMcMMORedeem is installed, enabled, and its credit API is available."
      - "Uses BeastWithdraw note NBT, withdraw commands, right-click redeem, depositor GUI, withdraw GUI, sounds, fees, taxes, amount overrides, and transaction logs."
      - "Credit balances are read through BeastMcMMORedeemAPI and exchanged credits are audit logged by BeastMcMMORedeem with command=beastwithdraw."
      - "Default mcMMO credit notes are integer-only, use no redeem tax, and preserve the exact withdrawn credit amount unless administrators configure tax or fees."
      - "Right-click and depositor GUI redeem check BeastMcMMORedeem remaining capacity before consuming notes, so Settings.Credits.MaxBalance cannot silently discard note value."
      - "/mcmmocreditwithdraw <amount|all> [stack] continues to withdraw the BeastMcMMORedeem credit balance."
      - "Withdraws/BeastMcMMORedeem/Withdraw-Skill.yml -> Settings.Enabled toggles the entire skill-note creation feature; when false, normal credit notes still work but skill command input, withdraw GUI skill selection, and admin mcmmoredeemskillcredits give/giveAll are disabled."
      - "Skill-bound notes use their own AssetHandler id plus item visuals, NBT keys, sounds, fees, logs, and messages from Withdraw-Skill.yml."
      - "Skill-bound note permission checks use hardcoded BeastWithdraw.McMMORedeemCredits.* nodes; Withdraw-Skill.yml no longer exposes Settings.Permission or Settings.Permissions.* override paths."
      - "Skill-bound notes no longer receive an injected skill lore line; admins can place %type% or %skill% wherever they want in the configured name or lore."
      - "Skill-bound note names, lore, custom drop names, and amount override text resolve %type% and %skill% to the stored mcMMO skill when the skill is available from item NBT."
      - "Admin give/giveAll for mcmmoredeemskillcredits require a skill argument before amount and create notes with that exact skill stored in Settings.SkillNBTKey."
      - "Generic BeastWithdraw messages use a safe %type% fallback so unresolved configured messages do not expose the raw placeholder."
      - "Depositer-Skills.yml provides a separate optional per-type depositor GUI/command for skill-bound notes."
      - "The main BeastWithdraw withdraw GUI opens a BeastMcMMORedeem selector when skill notes are enabled, preserving the normal credit-balance withdraw option and adding per-skill withdraw options."
      - "Withdraw-Skill.yml ConfigVersion 1.1 removes obsolete permission override keys from existing skill-note configs."

  withdraw_currency_symbol_config:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Uses Settings.Messages.CurrencySymbol and Settings.Messages.Format for formatted withdraw amounts."
    config_files:
      - "Withdraws/BeastLifeSteal/Withdraw.yml"
      - "Withdraws/BeastTokens/Withdraw.yml"
      - "Withdraws/CashNote/Withdraw.yml"
      - "Withdraws/PlayerPointsNote/Withdraw.yml"
      - "Withdraws/XpBottle/Withdraw.yml"
    config_options:
      - "Settings.Messages.CurrencySymbol"
      - "Settings.Messages.Format"
    behavior:
      - "Formatted amount placeholders such as %amount%, %balance%, %fee%, and %stacked-amount% now read Settings.Messages.CurrencySymbol."
      - "Settings.Messages.Format controls final amount text using %symbol%, %amount%, and %amount_raw%."
      - "Settings.Messages.Format also accepts legacy exact aliases %currency% and %currency_raw% as %amount% and %amount_raw%."
      - "Old Settings.Messages.Prefix and Settings.Messages.Suffix fallbacks are not read; suffix text should be written directly in Settings.Messages.Format."

  withdraw_amount_overrides:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Replaces legacy CustomModel.AmountModelData with full per-amount note item overrides."
    config_files:
      - "Withdraws/BeastLifeSteal/Withdraw.yml"
      - "Withdraws/BeastTokens/Withdraw.yml"
      - "Withdraws/CashNote/Withdraw.yml"
      - "Withdraws/PlayerPointsNote/Withdraw.yml"
      - "Withdraws/XpBottle/Withdraw.yml"
    removed_config_options:
      - "Settings.CustomModel.DefaultModelData"
      - "Settings.CustomModel.AmountModelData.Enabled"
      - "Settings.CustomModel.AmountModelData.Ranges"
    config_options:
      - "Settings.CustomModelData"
      - "Settings.Name"
      - "Settings.Lore"
      - "Settings.Player.Name"
      - "Settings.Player.Lore"
      - "Settings.Server.Name"
      - "Settings.Server.Lore"
      - "Settings.AmountOverrides.Enabled"
      - "Settings.AmountOverrides.Ranges"
      - "Settings.AmountOverrides.Ranges[].Id"
    commands:
      - "/BeastWithdraw give <player> <id> <amount> [stack] [tax] [signer] [-override <Id>] [-s]"
      - "/BeastWithdraw giveAll <id> <amount> [stack] [tax] [signer] [-override <Id>] [-s]"
    behavior:
      - "Settings.CustomModelData is the default custom model data for notes."
      - "Settings.Name and Settings.Lore are the default display text used when Player or Server display sections do not override them."
      - "Settings.Player and Settings.Server can override only the player-created or staff/console-created note display."
      - "Amount override ranges can override Item, Data, CustomModelData, Glow, SkullTexture, CustomName, Flags, Enchants, Name, Lore, Player, Server, and Sounds."
      - "Missing values in amount overrides inherit from the main Settings section."
      - "When a range sets generic Name or Lore, that value is used for both player-created and server/admin-created notes unless that same range also sets Player.Name, Server.Name, Player.Lore, or Server.Lore."
      - "Inherited values can be cleared with CLEAR/null for CustomModelData and Data, empty strings for string fields, empty lists/maps for list/map fields, and false for boolean features."
      - "Dropped note holograms and withdraw/redeem sounds resolve from the amount-specific override when configured."
      - "Each amount override range can define an optional Id such as large or premium."
      - "Admin give/giveall can force a named override with -override <Id>, ignoring min/max for that created note."
      - "Forced note ids are stored on the item as BeastWithdrawAmountOverride so drops, redeem sounds, and partial heart-note recreation keep the forced visual."
      - "Admin give/giveall always create server/admin-style notes for display selection; the optional signer argument is still stored and available as %player% but does not make the item use the Player display section."

  beastlifesteal_heart_withdraw:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Adds a BeastLifeSteal-backed heart withdraw type with custom withdraw and redeem logic."
    commands:
      primary: "/heartwithdraw"
      aliases:
        - "/withdrawheart"
        - "/blswithdraw"
    permissions:
      withdraw_permission: "BeastWithdraw.heartwithdraw.Withdraw"
      redeem_permission: "BeastWithdraw.heartwithdraw.Redeem"
      stacked_redeem_permission: "BeastWithdraw.heartwithdraw.Redeem.Stacked"
    config_files:
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/BeastLifeSteal/Withdraw.yml"
      - "BeastWithdraw-spigot/src/main/resources/config.yml"
    config_options:
      - "Settings.Withdraws.BeastLifeSteal.Enabled"
      - "Settings.DefaultAmount"
      - "Settings.AllowLethalWithdraw"
      - "Settings.RequireConfirmOnLethal"
      - "Settings.BlockDuringGracePeriod"
      - "Settings.CheckInventorySpace"
      - "Settings.Logs.Enabled"
      - "Settings.Logs.SeparateFile.Enabled"
    behavior:
      - "Uses BeastLifeSteal stored hearts as the withdrawable balance."
      - "The heart withdraw command permission is hardcoded as BeastWithdraw.heartwithdraw.Withdraw; Withdraw.yml no longer exposes Settings.Permission."
      - "Supports lethal-withdraw blocking or confirm-to-continue flow."
      - "Can block withdraw during BeastLifeSteal grace period."
      - "Redeem logic supports stacked redeem and partial redeem when capacity is limited."

  transaction_logging:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Adds withdraw/redeem transaction logging with global and per-type controls."
    commands:
      - "/beastwithdraw debug"
      - "/beastwithdraw debug on"
      - "/beastwithdraw debug off"
      - "/beastwithdraw debug reset"
      - "/beastwithdraw debug status"
    permissions:
      - "BeastWithdraw.admin.debug"
    config_files:
      - "BeastWithdraw-spigot/src/main/resources/config.yml"
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/XpBottle/Withdraw.yml"
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/CashNote/Withdraw.yml"
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/BeastTokens/Withdraw.yml"
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/PlayerPointsNote/Withdraw.yml"
      - "BeastWithdraw-spigot/src/main/resources/Withdraws/BeastLifeSteal/Withdraw.yml"
    config_options:
      - "config.yml -> Settings.Logs.Enabled"
      - "config.yml -> Settings.Logs.Console.Enabled"
      - "config.yml -> Settings.Logs.CombinedFile.Enabled"
      - "<type>.yml -> Settings.Logs.Enabled"
      - "<type>.yml -> Settings.Logs.SeparateFile.Enabled"
    supported_types:
      - "XpBottle"
      - "CashNote"
      - "BeastTokens currency handlers"
      - "PlayerPointsNote"
      - "BeastLifeSteal"
    behavior:
      - "Global logging switch must be enabled before any transaction logging is active."
      - "Per-type logging defaults to enabled and can disable logging for that type even when global logging is on."
      - "Console logging can be disabled in config and temporarily overridden for the current session with /beastwithdraw debug."
      - "Normal console logging goes through the plugin logger and appears in the server latest.log."
      - "A combined shared file can be written to plugins/BeastWithdraw/Logs/Combined/latest.log for all enabled types together."
      - "Separate per-type files are written to plugins/BeastWithdraw/Logs/<Type>/latest.log when enabled for that type."
      - "On startup, an existing per-type latest.log is rotated into yyyy-MM-dd-N.log.gz in the same type folder."
      - "On startup, an existing combined latest.log is rotated into yyyy-MM-dd-N.log.gz in the Combined folder."

  boostedyaml_config_system:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Replaces the old custom SnakeYAML/Bukkit config loader path with BeastLib BoostedYAML loading."
    config_files:
      - "config.yml"
      - "Withdraws/<type-folder>/*.yml"
      - "deposit-settings.yml"
      - "Lang/en-US.yml"
    behavior:
      - "Main config, deposit settings, withdraw type configs, per-type deposit override configs, and language files now load through BeastLibAPI.getYamlFiles()."
      - "Bundled defaults are merged through BoostedYAML update logic with keep-all behavior so custom user keys are preserved."
      - "Legacy plugin messages.yml is migrated automatically into Lang/en-US.yml when the new language file does not exist yet."
      - "Legacy flat Withdraws/*.yml files are migrated into Withdraws/<type-folder>/*.yml when the nested target is missing."

  language_file_selection:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Moves messages into the Lang folder and adds language-file selection in config."
    config_files:
      - "BeastWithdraw-spigot/src/main/resources/config.yml"
      - "BeastWithdraw-spigot/src/main/resources/Lang/en-US.yml"
    config_options:
      - "config.yml -> Settings.Language.Settings.File"
      - "config.yml -> Settings.Language.Settings.ForceLanguage"
    behavior:
      - "Default bundled language file is Lang/en-US.yml."
      - "Existing plugin messages.yml is migrated automatically to Lang/en-US.yml for upgraded servers."
      - "If the configured language file is missing and not bundled, the plugin falls back to en-US.yml."

  cashnote_bigdecimal_transactions:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Moves cash note withdraw and redeem calculations to BigDecimal-aware logic with Vault transaction verification."
    components:
      - "Cash withdraw command"
      - "Cash redeem flow"
      - "Cash note NBT exact amount storage"
    behavior:
      - "Cash notes now store an exact decimal amount string in NBT for precise redeem calculations."
      - "Cash withdraw combines note amount and fee into one verified Vault withdrawal before the note is created."
      - "Cash redeem validates the Vault deposit result before consuming the note item."
      - "Partial or failed Vault transactions are rolled back when possible and no note or money is granted on failure."
      - "The 'all' amount path now accounts for withdraw fees before deciding the cash note amount."

  withdraw_item_drop_display:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Dropped withdraw items can show their configured custom display name and optional glow color."
    config_files:
      - "Each withdraw type yml file under BeastWithdraw-spigot/src/main/resources/Withdraws/<type-folder>/"
    config_options:
      - "Settings.CustomName"
      - "Settings.Glow.Enabled"
      - "Settings.Glow.Color"
    behavior:
      - "If the dropped item contains a BeastWithdraw RedeemType tag, its dropped entity name is updated from the withdraw type config."
      - "Glow color is applied through scoreboard teams when glow is enabled and a color is configured."

  update_notifications:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Adds update checking for free and premium channels with console and admin notifications."
    permissions:
      - "BeastWithdraw.Admin"
    components:
      - "Modrinth free update checker"
      - "Spigot premium update checker"
      - "Join/login admin notify listener"
      - "Periodic async recheck task"
    config_options:
      - "config.yml -> Settings.UpdateNotifications.AdminJoin.Enabled"
    behavior:
      - "Checks free BeastWithdraw updates from Modrinth."
      - "Checks premium BeastWithdrawPlus updates from Spigot."
      - "Periodic update checks run in the background without repeating scheduled chat notices."
      - "Premium promo notice is shown when free is already current but premium is newer."
      - "Premium/free update announcer selection is based on whether SpigotMC replaces the %%__USER__%% download marker."
      - "Free builds only send update/premium-promo messages once on startup and optionally when an admin joins."
      - "Free and premium admin join notifications can be disabled with Settings.UpdateNotifications.AdminJoin.Enabled."

  beastlib_version_gate:
    status: "implemented"
    module: "BeastWithdraw-spigot"
    summary: "Stops normal startup when BeastLib is older than 1.6.22 and registers warning-only fallback commands."
    commands:
      - "/beastwithdraw"
      - "Enabled withdraw command names and aliases"
    dependency:
      plugin: "BeastLib"
      minimum_version: "1.6.22"
      update_url: "https://modrinth.com/plugin/beastlib"
    behavior:
      - "The first onEnable check verifies that BeastLib is installed, enabled, and at least version 1.6.22."
      - "When the BeastLib version check fails, normal configs, listeners, managers, metrics, and update checks are not started."
      - "A console warning is sent 1 tick later explaining that BeastWithdraw requires BeastLib 1.6.22 or higher."
      - "Fallback ShortCommand commands are registered for /beastwithdraw, its aliases, and enabled withdraw commands so command use shows the same update warning."
      - "Fallback alias loading uses Bukkit YamlConfiguration instead of BeastLib BoostedYAML to avoid relying on newer BeastLib config APIs during the version-failure path."
      - "The fallback path does not construct BeastWithdraw Utils or call BeastLibAPI.getUtils() while BeastLib is below the required version."

documentation_todo:
  - "Add future permissions here as soon as they are introduced."
  - "Add future commands here as soon as they are introduced."
  - "Add future config keys here as soon as they are introduced."
